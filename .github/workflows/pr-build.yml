name: PR Build

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile ./latest.zip
          Expand-Archive -Path ./latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev" -Force

      - name: Restore
        run: dotnet restore --verbosity normal

      - name: Build Release
        run: dotnet build --no-restore --configuration Release --verbosity normal

      - name: Store package artifact
        uses: actions/upload-artifact@v4
        with:
          name: PFBeacon
          path: src/PFBeacon/bin/Release/PFBeacon/latest.zip
          if-no-files-found: error
          retention-days: 7
